<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Reference Edition v15.0 – Campus AI</title>
    <!-- Google Fonts for Clean Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Cache-Busted Custom Stylesheet v22.0 (Universal ChatGPT Share Conversation Engine) -->
    <link rel="stylesheet" href="/static/css/style.css?v=22.0">
    <!-- Marked.js for Full Markdown Rendering Support -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Left Sidebar (Exact Reference Image Navigation Structure) -->
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="sidebar-header">
                <a href="/" class="brand-logo" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:0.6rem;">
                    <div class="logo-icon-campus" style="background: linear-gradient(135deg, #38BDF8 0%, #2563EB 100%); width: 32px; height: 32px; border-radius: 8px; display:flex; align-items:center; justify-content:center; color:#fff; box-shadow: 0 2px 10px rgba(56, 189, 248, 0.4);">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3L1 9L12 15L21 10.09V17H23V9M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18Z"/></svg>
                    </div>
                    <span style="font-weight: 700; font-size: 1.05rem; letter-spacing: -0.01em; color: #ECECEC;">Campus AI</span>
                </a>
                <button class="sidebar-toggle-icon" id="close-sidebar" aria-label="Toggle Sidebar">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                </button>
            </div>

            <div class="sidebar-nav-list">
                <button class="nav-item new-chat-btn" id="new-chat-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    <span>New chat</span>
                </button>
            </div>

            <div class="sidebar-section chat-history-section">
                <div class="nav-collapsible-header">
                    <span>Pinned</span>
                    <span class="chevron">&rsaquo;</span>
                </div>
                <div class="nav-collapsible-header active-header">
                    <span>Recents</span>
                    <span class="chevron">&rsaquo;</span>
                </div>
                <div class="chat-sessions-list"></div>
            </div>

            <!-- Bottom User Profile: Guest Account as requested -->
            <div class="sidebar-footer-profile">
                <div class="profile-left">
                    <div class="user-avatar-circle" style="background: #2563EB; color: white;">G</div>
                    <div class="user-profile-text">
                        <span class="user-name">Guest Account</span>
                        <span class="user-status">Free Academic Plan &bull; Online</span>
                    </div>
                </div>
                <div class="profile-right">
                    <button class="profile-action-icon" id="api-toggle" title="Settings & API Key">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06-.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- API Key Config Panel -->
            <div class="api-config-panel" id="api-config-panel" style="display: none; margin: 0.5rem;">
                <label for="gemini-api-key">Gemini Free Tier API Key (Optional)</label>
                <input type="password" id="gemini-api-key" placeholder="AIzaSy... / AQ..." autocomplete="off">
                <div class="api-actions">
                    <button class="btn-save-api" id="save-api-key">Save Key</button>
                    <button class="btn-clear-api" id="clear-api-key">Clear</button>
                </div>
                <small>Uses local Scikit-Learn + Free Edu LLM when blank.</small>
            </div>
        </aside>

        <!-- Main Chat Canvas Area -->
        <main class="chat-main">
            <!-- Header matching Screenshot (`Campus AI ⌄` / `[↑ Share]`) -->
            <header class="chat-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="toggle-sidebar" aria-label="Toggle Sidebar">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </button>
                    <div class="chatgpt-header-dropdown">
                        <span class="dropdown-title">Campus AI</span>
                        <span class="dropdown-chevron">&#8964;</span>
                    </div>
                </div>
                <div class="header-right">
                    <a href="/" class="header-nav-link" title="Back to Landing Page">Home</a>
                    <button class="btn-share-header" title="Share Conversation">
                        <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                        <span>Share</span>
                    </button>
                    <button class="btn-more-header" id="clear-chat" title="Clear Conversation">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages Display Area (Centered 850px Container) -->
            <section class="chat-messages" id="chat-messages" aria-live="polite">
                <!-- Welcome Screen / Empty State -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-logo" style="display:flex; justify-content:center; margin-bottom:1.5rem;">
                        <div class="logo-campus-large" style="background: linear-gradient(135deg, #38BDF8 0%, #2563EB 100%); width: 64px; height: 64px; border-radius: 16px; display:flex; align-items:center; justify-content:center; color:#fff; box-shadow: 0 4px 24px rgba(56, 189, 248, 0.45);">
                            <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor"><path d="M12 3L1 9L12 15L21 10.09V17H23V9M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18Z"/></svg>
                        </div>
                    </div>
                    <h2>How can Campus AI assist your college studies today?</h2>

                    <div class="quick-topics-grid">
                        <button class="topic-card" data-query="Explain Object-Oriented Programming (OOP) in Python with clean examples.">
                            <div class="card-icon">💻</div>
                            <div class="card-content">
                                <h4>Python & Coding Mastery</h4>
                                <p>OOP, Data Structures, Algorithms & C++ tutorials</p>
                            </div>
                        </button>

                        <button class="topic-card" data-query="What is the semester examination schedule and B.Tech fee structure?">
                            <div class="card-icon">🏛️</div>
                            <div class="card-content">
                                <h4>Campus FAQ Resolution</h4>
                                <p>Fee breakdowns, exam schedules & hostel guidelines</p>
                            </div>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Chat Input Footer (Fixed at bottom, matching exact screenshot pill with + button and ||| waveform) -->
            <footer class="chat-input-container">
                <div class="input-container-inner">
                    <div class="input-wrapper glass-input">
                        <!-- Left + Circle Button exactly like screenshot -->
                        <button class="pill-plus-btn" id="attachment-btn" title="Add attachment / action" aria-label="Add attachment" type="button">
                            <span>+</span>
                        </button>

                        <textarea 
                            id="user-input" 
                            rows="1" 
                            placeholder="Ask anything"
                            aria-label="Chat Input"
                        ></textarea>

                        <!-- Right Microphone Icon -->
                        <button class="voice-btn" id="voice-btn" title="Voice Input" aria-label="Voice Input" type="button">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>

                        <!-- Right White Waveform Circle Button right next to Mic -->
                        <button class="waveform-btn" id="send-btn" title="Send or Voice Waveform" aria-label="Send or Audio" type="button">
                            <div class="waveform-bars">
                                <span></span><span></span><span></span><span></span>
                            </div>
                        </button>
                    </div>
                    <div class="input-disclaimer">
                        ChatGPT can make mistakes. Check important info.
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <!-- Application JavaScript with Cache Busting v15.0 -->
    <script src="/static/js/script.js?v=15.0"></script>
</body>
</html>
